name: Code Quality

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  FORCE_COLOR: "1"
  PY_COLORS: "1"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Pre-commit Checks (black, isort, flake8, mypy)
  # ---------------------------------------------------------------------------
  pre-commit-checks:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-quality-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-quality-

      - name: Install pre-commit tools
        run: |
          python -m pip install --upgrade pip
          pip install \
            pre-commit==3.7.0 \
            black==24.4.2 \
            isort==5.13.2 \
            flake8==7.0.0 \
            flake8-docstrings==1.7.0 \
            flake8-bugbear==24.2.6 \
            mypy==1.10.0

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files --show-diff-on-failure || true

      - name: Black format check
        run: |
          echo "### Black Format Check" >> $GITHUB_STEP_SUMMARY
          black --check --diff --color . || {
            echo "Black formatting issues found." >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            black --diff --color . | head -100 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 0
          }
          echo "All files are properly formatted." >> $GITHUB_STEP_SUMMARY

      - name: isort import order check
        run: |
          echo "### isort Import Order Check" >> $GITHUB_STEP_SUMMARY
          isort --check-only --diff --color . || {
            echo "Import ordering issues found." >> $GITHUB_STEP_SUMMARY
            exit 0
          }
          echo "All imports are properly ordered." >> $GITHUB_STEP_SUMMARY

      - name: Flake8 linter check
        run: |
          echo "### Flake8 Linter Check" >> $GITHUB_STEP_SUMMARY
          flake8 . \
            --count \
            --statistics \
            --show-source \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s' || {
              echo "Flake8 issues found." >> $GITHUB_STEP_SUMMARY
              exit 0
            }
          echo "No flake8 issues found." >> $GITHUB_STEP_SUMMARY

      - name: MyPy type check
        run: |
          echo "### MyPy Type Check" >> $GITHUB_STEP_SUMMARY
          mypy . \
            --ignore-missing-imports \
            --show-error-codes \
            --pretty || {
              echo "Type checking issues found." >> $GITHUB_STEP_SUMMARY
              exit 0
            }
          echo "Type checking passed." >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # 2. Code Coverage Report (pytest-cov, 80% threshold)
  # ---------------------------------------------------------------------------
  coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-coverage-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-coverage-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.2.0 pytest-cov==5.0.0 coverage==7.5.0

      - name: Create test directory if not exists
        run: |
          if [ ! -d "tests" ]; then
            mkdir -p tests
            echo "import sys" > tests/__init__.py
            echo "# Placeholder test - replace with real tests" > tests/test_placeholder.py
            echo "" >> tests/test_placeholder.py
            echo "def test_placeholder():" >> tests/test_placeholder.py
            echo "    assert True" >> tests/test_placeholder.py
          fi

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov=qscg_v2_1_final \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=0 \
            --junitxml=reports/junit.xml || true

      - name: Generate coverage summary
        run: |
          python << 'EOF'
          import xml.etree.ElementTree as ET
          import sys

          try:
              tree = ET.parse('reports/coverage.xml')
              root = tree.getroot()
              line_rate = float(root.get('line-rate', '0'))
              branch_rate = float(root.get('branch-rate', '0'))
              lines_covered = int(root.get('lines-covered', '0'))
              lines_valid = int(root.get('lines-valid', '0'))
              branches_covered = int(root.get('branches-covered', '0'))
              branches_valid = int(root.get('branches-valid', '0'))

              line_pct = line_rate * 100
              branch_pct = branch_rate * 100

              threshold = 80.0
              status = "PASS" if line_pct >= threshold else "FAIL"

              with open('coverage-summary.md', 'w') as f:
                  f.write("### Code Coverage Report\n\n")
                  f.write(f"| Metric | Value | Status |\n")
                  f.write(f"|---|---|---|\n")
                  f.write(f"| Line Coverage | {line_pct:.2f}% | {'PASS' if line_pct >= threshold else 'FAIL'} |\n")
                  f.write(f"| Branch Coverage | {branch_pct:.2f}% | {'PASS' if branch_pct >= threshold else 'FAIL'} |\n")
                  f.write(f"| Lines Covered | {lines_covered} / {lines_valid} | - |\n")
                  f.write(f"| Branches Covered | {branches_covered} / {branches_valid} | - |\n")
                  f.write(f"| Threshold | {threshold}% | - |\n")
                  f.write(f"\n**Overall: {status}**\n")

              print(f"Line Coverage: {line_pct:.2f}%")
              print(f"Branch Coverage: {branch_pct:.2f}%")

              if line_pct < threshold:
                  print(f"::warning::Coverage {line_pct:.2f}% is below threshold {threshold}%")
          except Exception as e:
              print(f"::warning::Could not parse coverage report: {e}")
              with open('coverage-summary.md', 'w') as f:
                  f.write("### Code Coverage Report\n\n")
                  f.write("Coverage report could not be generated.\n")
          EOF

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            reports/
            coverage-summary.md
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. SonarQube Scan (commented out – optional)
  # ---------------------------------------------------------------------------
  # sonarqube:
  #   name: SonarQube Scan
  #   runs-on: ubuntu-latest
