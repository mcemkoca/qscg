name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: |
          pip install black isort flake8
      - name: Check code formatting
        run: |
          black . --check --diff || \
            (echo "::warning::Run 'black .' to fix formatting" && true)
      - name: Check import sorting
        run: |
          isort . --check-only --diff || \
            (echo "::warning::Run 'isort .' to fix imports" && true)
      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=200 --ignore=E501,W503 --statistics || true
      - name: Auto-format code
        run: |
          black . || true
          isort . || true
      - name: Verify module imports
        run: python -c "import qscg_v2_1_final; print('OK')" || true
