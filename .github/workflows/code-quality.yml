  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #       with:
  #         args: >
  #           -Dsonar.projectKey=mcemkoca_qscg
  #           -Dsonar.organization=mcemkoca
  #           -Dsonar.python.version=3.9,3.10,3.11,3.12
  #           -Dsonar.sources=src,qscg_v2_1_final.py
  #           -Dsonar.tests=tests
  #           -Dsonar.python.coverage.reportPaths=reports/coverage.xml

  # ---------------------------------------------------------------------------
  # 4. Auto-format (optional) – Auto-fix formatting issues
  # ---------------------------------------------------------------------------
  auto-format:
    name: Auto-format (Optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'auto-format')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==24.4.2 isort==5.13.2

      - name: Auto-fix formatting
        run: |
          black .
          isort .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-format with black and isort'
          file_pattern: '*.py'
          commit_options: '--no-verify'

  # ---------------------------------------------------------------------------
  # 5. Documentation Check – Docstring coverage
  # ---------------------------------------------------------------------------
  docstring-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-doc-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-doc-

      - name: Install docstring tools
        run: |
          python -m pip install --upgrade pip
          pip install \
            pydocstyle==6.3.0 \
            interrogate==1.7.0 \
            darglint==1.8.1

      - name: Check docstring coverage with interrogate
        run: |
          interrogate . \
            --verbose \
            --fail-under=50 \
            --generate-badge=reports/docstring-badge.svg \
            --output=reports/interrogate-report.txt \
            --ignore-init-module \
            --ignore-init-method \
            --ignore-magic \
            --ignore-property-decorators \
            --ignore-nested-functions \
            --ignore-nested-classes \
            --exclude=tests,docs,.git,.github,venv,.venv,__pycache__ \
            || true

      - name: Run pydocstyle
        run: |
          pydocstyle . \
            --match='(?!test_).*\.py' \
            --ignore=D100,D104,D203,D212,D213,D406,D407,D413 \
            || true

      - name: Upload docstring report
        uses: actions/upload-artifact@v4
        with:
          name: docstring-report
          path: |
            reports/interrogate-report.txt
            reports/docstring-badge.svg
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 6. Complexity Check – Cyclomatic complexity (radon/mccabe)
  # ---------------------------------------------------------------------------
  complexity-check:
    name: Complexity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install complexity tools
        run: |
          python -m pip install --upgrade pip
          pip install \
            radon==6.0.1 \
            xenon==0.9.1

      - name: Run radon raw metrics
        run: |
          echo "### Raw Metrics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          radon raw src/ qscg_v2_1_final.py --summary >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run radon cyclomatic complexity (CC)
        run: |
          echo "### Cyclomatic Complexity" >> $GITHUB_STEP_SUMMARY
          radon cc src/ qscg_v2_1_final.py \
            --show-complexity \
            --average \
            --min=B \
            --total-average || {
              echo "::warning::High complexity functions detected"
              exit 0
            }

      - name: Run radon maintainability index (MI)
        run: |
          echo "### Maintainability Index" >> $GITHUB_STEP_SUMMARY
          radon mi src/ qscg_v2_1_final.py \
            --show || true

      - name: Run xenon complexity monitor
        run: |
          echo "### Xenon Complexity Monitor" >> $GITHUB_STEP_SUMMARY
          xenon src/ qscg_v2_1_final.py \
            --max-absolute B \
            --max-modules A \
            --max-average A || {
              echo "::warning::Xenon complexity check failed"
              exit 0
            }

      - name: Generate complexity report
        run: |
          mkdir -p reports
          radon cc src/ qscg_v2_1_final.py --json > reports/complexity-cc.json || true
          radon mi src/ qscg_v2_1_final.py --json > reports/complexity-mi.json || true
          radon raw src/ qscg_v2_1_final.py --json > reports/complexity-raw.json || true

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: reports/complexity-*.json
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 7. Comment PR – Post quality report as PR comment
  # ---------------------------------------------------------------------------
  comment-pr:
    name: Comment PR with Quality Report
    needs: [pre-commit-checks, coverage, complexity-check, docstring-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: reports/
        continue-on-error: true

      - name: Download complexity reports
        uses: actions/download-artifact@v4
        with:
          name: complexity-report
          path: reports/
        continue-on-error: true

      - name: Generate PR quality comment
        run: |
          cat << 'COMMENT' > pr-quality-comment.md
          ## Code Quality Report

          | Check | Status |
          |-------|--------|
          | Pre-commit Checks | ${{ needs.pre-commit-checks.result }} |
          | Code Coverage | ${{ needs.coverage.result }} |
          | Documentation Check | ${{ needs.docstring-check.result }} |
          | Complexity Check | ${{ needs.complexity-check.result }} |

          COMMENT

          if [ -f "reports/coverage-summary.md" ]; then
            echo "" >> pr-quality-comment.md
            cat reports/coverage-summary.md >> pr-quality-comment.md
          fi

          echo "" >> pr-quality-comment.md
          echo "---" >> pr-quality-comment.md
          echo "*Generated by GitHub Actions – Code Quality workflow*" >> pr-quality-comment.md

      - name: Post quality report as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-quality-report
          recreate: true
          path: pr-quality-comment.md

      - name: Summary
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit Checks | ${{ needs.pre-commit-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation Check | ${{ needs.docstring-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Complexity Check | ${{ needs.complexity-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PR Comment | ${{ needs.comment-pr.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Quality report posted as PR comment." >> $GITHUB_STEP_SUMMARY
