name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check wiki docs exist
        run: |
          if [ ! -d "docs/wiki" ]; then
            echo "No docs/wiki directory found - skipping"
            exit 0
          fi
          if [ -z "$(ls -A docs/wiki/*.md 2>/dev/null)" ]; then
            echo "No wiki markdown files found - skipping"
            exit 0
          fi
          echo "Found wiki docs, publishing..."
      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: docs/wiki
