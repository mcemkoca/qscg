name: Security Scan

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

env:
  FORCE_COLOR: "1"

jobs:
  # ---------------------------------------------------------------------------
  # 1. CodeQL Analysis – Semantic code analysis for Python
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality
          config: |
            paths:
              - src
              - qscg_v2_1_final.py
            paths-ignore:
              - tests
              - '**/__pycache__'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          upload: true

  # ---------------------------------------------------------------------------
  # 2. Dependency Review – Scan for known vulnerabilities in dependencies
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: true
          comment-summary-in-pr: true

  # ---------------------------------------------------------------------------
  # 3. Trivy Scanner – Container & filesystem vulnerability scanner
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs-scan'

      - name: Run Trivy vulnerability summary
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # 4. Bandit – Python security linter
  # ---------------------------------------------------------------------------
  bandit:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[sarif]==1.7.8

      - name: Run Bandit scan
        run: |
          bandit -r . \
            -f sarif \
            -o bandit-results.sarif \
            -ll \
            -ii \
            -x ./tests,./.git,./.github,./venv,./.venv \
            --skip B101,B311 \
            || true

      - name: Run Bandit console output
        run: |
          bandit -r . \
            -f screen \
            -ll \
            -ii \
            -x ./tests,./.git,./.github,./venv,./.venv \
            --skip B101,B311 \
            || true

      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'bandit-results.sarif'
          category: 'bandit-python-scan'

  # ---------------------------------------------------------------------------
  # 5. Safety – Python dependency security check
  # ---------------------------------------------------------------------------
  safety:
    name: Safety Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-safety-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-safety-

      - name: Install Safety
        run: |
          python -m pip install --upgrade pip
          pip install safety==3.2.0

      - name: Run Safety check
        run: |
          safety check \
            -r requirements.txt \
            --full-report \
            --json \
            --output safety-results.json \
            || true

      - name: Run Safety check (text output)
        run: |
          safety check \
            -r requirements.txt \
            --full-report \
            || true

      - name: Upload Safety results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-results
          path: safety-results.json
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 6. Secret Detection – truffleHog
  # ---------------------------------------------------------------------------
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Scan with GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # 7. pip-audit – Python package vulnerability scanner
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: |
          pip-audit \
            --requirement=requirements.txt \
            --format=json \
            --output=pip-audit-results.json \
            --desc \
            || true

      - name: Run pip-audit (summary)
        run: |
          pip-audit \
            --requirement=requirements.txt \
            --format=summary \
            || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 8. SARIF Upload Consolidation
  # ---------------------------------------------------------------------------
  consolidate-results:
    name: Consolidate Security Results
    needs: [codeql, bandit, trivy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports
          pattern: '*-results'
          merge-multiple: true

      - name: Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS Scan | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit Linter | ${{ needs.bandit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Safety Check | ${{ needs.safety.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit | ${{ needs.pip-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> All results are uploaded to the GitHub Security tab." >> $GITHUB_STEP_SUMMARY
