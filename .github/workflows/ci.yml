name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          if [ -d "tests" ] && ls tests/test_*.py 1>/dev/null 2>&1; then
            pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-fail-under=0 || true
          else
            echo "No tests found - checking Python syntax..."
            python -m py_compile qscg_v2_1_final.py
            echo "Syntax OK"
          fi
      - name: Check imports
        run: python -c "import qscg_v2_1_final; print('Module loaded OK')" || true
      - name: Test CLI
        run: python qscg_v2_1_final.py --version || python qscg_v2_1_final.py -h || true
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: hashFiles('coverage.xml') != ''
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
